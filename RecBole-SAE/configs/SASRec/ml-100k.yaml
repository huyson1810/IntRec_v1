# ─── SASRec base-model config ─────────────────────────────────────────────────
model: SASRec
dataset: ml-100k
data_path: dataset/

embedding_size: 64
hidden_size: 64
num_layers: 2
num_heads: 2
inner_size: 256
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: gelu
layer_norm_eps: 1.0e-12
initializer_range: 0.02
loss_type: CE
MAX_ITEM_LIST_LENGTH: 50

epochs: 300
train_batch_size: 256
learner: adam
learning_rate: 0.001
eval_step: 10
stopping_step: 50

eval_args:
  split:
    LS: valid_and_test
  group_by: user
  order: TO
  mode: full
metrics: [Recall, MRR, NDCG, Hit, Precision]
topk: [10]
valid_metric: MRR@10
